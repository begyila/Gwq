plugins {
    id 'com.android.application' version '8.5.2'
}

android {
    namespace 'com.begum.gwdetector'
    compileSdk 35

    defaultConfig {
        applicationId 'com.begum.gwdetector'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    sourceSets {
        main {
            manifest.srcFile 'AndroidManifest.xml'
            java.srcDirs = ['.']
            assets.srcDirs = ['.']
        }
    }
}
